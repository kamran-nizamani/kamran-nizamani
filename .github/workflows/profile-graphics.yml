name: Profile Graphics (3D Contrib + Snake)

on:
  schedule:
    - cron: "0 0 * * *"   # daily at midnight UTC
  workflow_dispatch:

jobs:
  build-3d-contrib:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: kamran-nizamani
      - name: Commit generated SVGs
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -f ./profile-3d-contrib/*.svg
          git commit -m "Update 3D contribution graph" || exit 0
          git push

  build-snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: kamran-nizamani
          outputs: |
            dist/github-contribution-grid-snake-dark-teal.svg?color_snake=%2314B8A6&color_dots=%230F172A,%230F766E,%2314B8A6,%232DD4BF,%2399F6E4
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
